name: Release

# Obsidian plugin discovery requires the GitHub release tag to match
# manifest.json#version EXACTLY (no `v` prefix). The community plugin
# store and BRAT installer both read the manifest from the GH release
# at tag <version>.
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required for actions/attest-build-provenance to sign the release assets
      # so users can cryptographically verify they were built from this repo.
      attestations: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Verify tag matches manifest.json + package.json
        run: |
          TAG_VERSION="${GITHUB_REF_NAME}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          echo "tag=$TAG_VERSION pkg=$PKG_VERSION manifest=$MANIFEST_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ] || [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Version mismatch — bump package.json + manifest.json to $TAG_VERSION before tagging."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            manifest.json
            main.js
            styles.css
          fail_on_unmatched_files: true
          generate_release_notes: true
